config:
  edition: 2

bucket_definitions:
  user_data:
    parameters: SELECT tenant_id FROM profiles WHERE user_id = token_parameters.user_id

    data:
      - SELECT * FROM tenants WHERE id = bucket.tenant_id
      # Explicit columns: pin_hash / pin_lookup are server-only and must NEVER
      # reach devices. pin_set_at (a non-secret "has a PIN" timestamp) is synced.
      - SELECT id, user_id, tenant_id, branch_id, role, permissions, display_name, profile_picture_url, phone, address, status, pin_set_at, created_at, updated_at FROM profiles WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM products WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM product_branches WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM customers WHERE tenant_id = bucket.tenant_id
     # - SELECT * FROM suppliers WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM categories WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM item_groups WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM composite_item_components WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM units_of_measurement WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM staff_members WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM stock WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM stock_adjustments WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM stock_adjustment_reasons WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM locations WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM branches WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM sales WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM sale_items WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM sale_payments WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM sale_approvals WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM credit_notes WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM credit_note_items WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM commissions WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM profile_branches WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM expense_categories WHERE tenant_id = bucket.tenant_id
      - SELECT * FROM expenses WHERE tenant_id = bucket.tenant_id
      # These snapshot tables have no `id` column (composite keys), so synthesize
      # a stable unique id from the key parts — PowerSync requires an `id`.
      - SELECT *, (tenant_id || '|' || IFNULL(branch_id, 'all') || '|' || snapshot_date) AS id FROM daily_kpi_snapshots WHERE tenant_id = bucket.tenant_id
      - SELECT *, (tenant_id || '|' || IFNULL(branch_id, 'all') || '|' || snapshot_date || '|' || IFNULL(payment_method, '')) AS id FROM daily_payment_method_snapshots WHERE tenant_id = bucket.tenant_id
      - SELECT *, (tenant_id || '|' || IFNULL(branch_id, 'all') || '|' || snapshot_date || '|' || IFNULL(product_id, '')) AS id FROM daily_product_sales_snapshots WHERE tenant_id = bucket.tenant_id