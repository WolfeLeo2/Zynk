name: Release Please

on:
  push:
    branches:
      - PH

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: dart
          target-branch: PH

  build-android:
    name: Build Android
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "::add-mask::$KEY_PASSWORD"
          echo "::add-mask::$STORE_PASSWORD"
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties
          echo "=== key.properties written ==="

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Validate Secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}
        run: |
          missing=()
          [ -z "$SUPABASE_URL" ]     && missing+=("SUPABASE_URL")
          [ -z "$SUPABASE_ANON_KEY" ] && missing+=("SUPABASE_ANON_KEY")
          [ -z "$POWERSYNC_URL" ]    && missing+=("POWERSYNC_URL")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            echo "Add them under Settings → Secrets and Variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Build Android Release
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          POWERSYNC_URL: ${{ secrets.POWERSYNC_URL }}
        run: |
          # Use python to safely write JSON — avoids shell escaping issues
          # with special characters in secret values (dots, slashes, = signs, etc.)
          python3 -c "
          import json, os, sys
          data = {
            'SUPABASE_URL':     os.environ['SUPABASE_URL'],
            'SUPABASE_ANON_KEY': os.environ['SUPABASE_ANON_KEY'],
            'POWERSYNC_URL':    os.environ['POWERSYNC_URL'],
          }
          # Sanity-check: no value should be empty after the validation step
          for k, v in data.items():
            if not v:
              print(f'ERROR: {k} is empty after injection', file=sys.stderr)
              sys.exit(1)
          with open('dart_defines.json', 'w') as f:
            json.dump(data, f, indent=2)
          print('dart_defines.json written successfully')
          "
          flutter build apk --release --dart-define-from-file=dart_defines.json

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: build/app/outputs/flutter-apk/app-release.apk
